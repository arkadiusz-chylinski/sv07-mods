#####################################################################
# Additional configuration modules
#####################################################################

[include macros.cfg]
[include sensors.cfg]
[include probe_eddy.cfg]
[include resonance.cfg]
[include plr.cfg]

[exclude_object]

#####################################################################
# MCU – MAINBOARD AND TOOLHEAD
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu EBB36TH]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_ebb36th-if00
restart_method: command

#####################################################################
# PRINTER PARAMETERS
#####################################################################

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 4000
max_z_velocity: 25
max_z_accel: 100
square_corner_velocity: 3

#####################################################################
# FILESYSTEM AND STATUS
#####################################################################

[virtual_sdcard]
path: /home/mks/printer_data/gcodes

[pause_resume]
[display_status]

[idle_timeout]
timeout: 600
gcode:
    RESPOND TYPE=echo MSG="No operations in 10min!"

#####################################################################
# STEPPERS
#####################################################################

[stepper_x]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -18
position_min: -18
position_max: 275
homing_speed: 100
homing_retract_dist: 0
step_pulse_duration: 0.000002

[tmc2209 stepper_x]
uart_pin: PE3
uart_address: 3
run_current: 1.2
driver_sgthrs: 95
stealthchop_threshold: 0
diag_pin: ^PD10


[stepper_y]
step_pin: PB7
dir_pin: PB6
enable_pin: !PB9
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -20
position_min: -20
position_max: 300
homing_speed: 100
homing_retract_dist: 0
step_pulse_duration: 0.000002

[tmc2209 stepper_y]
uart_pin: PE4
uart_address: 3
run_current: 1.2
driver_sgthrs: 95
stealthchop_threshold: 0
diag_pin: ^PE0


[stepper_z]
step_pin: PB3
dir_pin: !PD7
enable_pin: !PB5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -4
position_max: 355
homing_speed: 10

[stepper_z1]
step_pin: PA7
dir_pin: !PA6
enable_pin: !PC5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop

#####################################################################
# EXTRUDER
#####################################################################

[extruder]
step_pin: EBB36TH:PD0
dir_pin: !EBB36TH:PD1
enable_pin: !EBB36TH:PD2
microsteps: 32
rotation_distance: 22
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36TH:PB13
sensor_type: PT1000
sensor_pin: EBB36TH:PA3
pressure_advance: 0.02
pressure_advance_smooth_time: 0.04
instantaneous_corner_velocity: 3
max_extrude_cross_section: 500
max_extrude_only_distance: 100
max_extrude_only_velocity: 2000
max_extrude_only_accel: 1500
min_temp: 0
max_temp: 305
min_extrude_temp: 150

[tmc2209 extruder]
uart_pin: EBB36TH:PA15
run_current: 0.7

#####################################################################
# HEATED BED
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA3
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 110

#####################################################################
# FANS
#####################################################################

[heater_fan hotend_fan]
pin: EBB36TH:PA1
heater: extruder
heater_temp: 50.0

[fan]
pin: EBB36TH:PA0

[controller_fan Fan_Board]
pin: PD3
fan_speed: 1.0
idle_timeout: 120
heater: heater_bed
stepper: stepper_x, stepper_y, stepper_z, stepper_z1

#####################################################################
# FILAMENT SENSOR
#####################################################################

[filament_switch_sensor Filament]
switch_pin: PD11